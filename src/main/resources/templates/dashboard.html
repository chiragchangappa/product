<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Management Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            min-height:100vh;
        }

       
        .top-bar{
            display:flex;
            justify-content:flex-end;
            padding:20px 40px;
        }

        .logout-btn{
            background:#e74c3c;
            color:white;
            text-decoration:none;
            padding:10px 20px;
            border-radius:6px;
            font-weight:bold;
            transition:0.3s;
        }

        .logout-btn:hover{
            background:#c0392b;
        }

        
        .container{
            width:700px;
            margin:80px auto;
            background:white;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
            text-align:center;
            overflow:hidden;
        }

        .header{
            background:#2c3e50;
            color:white;
            padding:25px;
        }

        .header h1{
            font-size:32px;
        }

        .content{
            padding:50px;
        }

        .content h2{
            color:#333;
            margin-bottom:15px;
        }

        .content p{
            color:#666;
            font-size:18px;
            margin-bottom:35px;
        }

        .product-btn{
            display:inline-block;
            background:#27ae60;
            color:white;
            text-decoration:none;
            padding:14px 30px;
            border-radius:8px;
            font-size:18px;
            font-weight:bold;
            transition:0.3s;
        }

        .product-btn:hover{
            background:#219150;
            transform:translateY(-3px);
        }

        .footer{
            background:#f5f5f5;
            padding:15px;
            color:#777;
        }

    </style>

</head>

<body>

    
    <div class="top-bar">
		<form th:action="@{/logout}" method="post">
		    <button type="submit" class="logout-btn">
		        Logout
		    </button>
		</form>
    </div>

    
    <div class="container">

        <div class="header">
            <h1>Product Management System</h1>
        </div>

        <div class="content">

            <h2>Welcome Admin</h2>

            <p>
                Manage products using the button below.
            </p>

            <a th:href="@{/products}" class="product-btn">
                Manage Products
            </a>

        </div>

        <div class="footer">
            Spring Boot CRUD Assessment Project
        </div>

    </div>

</body>
</html>
