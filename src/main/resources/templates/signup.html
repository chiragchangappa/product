<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<link rel="stylesheet" th:href="@{/css/style.css}">
<title>Signup</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
}

.container{
    width:350px;
    margin:100px auto;
    background:white;
    padding:20px;
    border-radius:8px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:10px;
}

</style>

</head>
<body>

<div class="container">

    <h2>Create Account</h2>

    <form th:action="@{/register}"
          th:object="${user}"
          method="post">

        <input type="text"
               th:field="*{username}"
               placeholder="Username"
               required>

        <input type="password"
               th:field="*{password}"
               placeholder="Password"
               required>

        <button type="submit">
            Register
        </button>

    </form>

    <br>

    <a th:href="@{/login}">
        Back To Login
    </a>

</div>

</body>
</html>
