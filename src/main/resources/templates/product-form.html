<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<link rel="stylesheet" th:href="@{/css/style.css}">
<title>Product Form</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
}

.container{
    width:400px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:8px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:10px;
}

</style>

</head>
<body>

<div class="container">

    <h2>Add / Update Product</h2>

    <form th:action="@{/products/save}"
          th:object="${product}"
          method="post">

        <input type="hidden"
               th:field="*{id}">

        <input type="text"
               th:field="*{name}"
               placeholder="Product Name"
               required>

        <input type="number"
               step="0.01"
               th:field="*{price}"
               placeholder="Price"
               required>

        <input type="number"
               th:field="*{quantity}"
               placeholder="Quantity"
               required>

        <button type="submit">
            Save Product
        </button>

    </form>

    <br>

    <a th:href="@{/products}">
        Back To Products
    </a>

</div>

</body>
</html>
