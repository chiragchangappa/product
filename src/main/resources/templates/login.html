<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Login</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }

        .container{
            width:350px;
            margin:100px auto;
            background:white;
            padding:20px;
            border-radius:8px;
            box-shadow:0 0 10px #ccc;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
            margin-bottom:10px;
        }

        button{
            width:100%;
            padding:10px;
            background:#333;
            color:white;
            border:none;
            cursor:pointer;
        }

        a{
            text-decoration:none;
        }
    </style>

</head>
<body>

<div class="container">

    <h2>Login</h2>

    <form th:action="@{/login}" method="post">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <br>

    <a th:href="@{/signup}">
        Create Account
    </a>

</div>

</body>
</html>
